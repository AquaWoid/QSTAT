services:

  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - qstat-network

  frontend:
    build:
      context: ./Frontend
    container_name: qstat-client
    ports:
      - "3000:3000"
    environment:
      - FASTAPI_URL=http://backend:8000
      - ORIGIN=http://app.${HOSTNAME}
      - BODY_SIZE_LIMIT=Infinity
    depends_on:
      - backend
    labels:
      - "traefik.http.routers.client.rule=Host(`app.${HOSTNAME}`)"
      - "traefik.http.services.client.loadbalancer.server.port=3000"
    networks:
      - qstat-network


  backend:
    build:
      context: ./Backend
    container_name: qstat-api
    ports:
      - "8000:8000"
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
#      - DATABASE_URL=postgresql+asyncpg://${PG_USER}:${PG_PWD}@postgresql:5432/${PG_DB}
      - CUDA_VISIBLE_DEVICES=0
      - CHROMA_URL=http://chroma:8000
      - OPENROUTER_KEY=${OPENROUTER_KEY}
    labels:
      - "traefik.http.routers.backend.rule=Host(`api.${HOSTNAME}`)"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/whisper:/root/.cache/whisper
      - ~/.cache/chroma:/root/.cache/chroma
    networks:
      - qstat-network


  vllm:
    image: vllm/vllm-openai-cpu
    container_name: vllm
    ports:
      - "8001:8000"
    command: >
      --model ${CPU_MODEL_NAME}
      --gpu-memory-utilization 0.50 
      --dtype half 
      --max-model-len ${CONTEXT_WINDOW_LEN} 
      --host 0.0.0.0 
      --port 8000
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    networks:
      - qstat-network


networks:
  qstat-network:
    driver: bridge